<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Soft Finds — Aesthetic & Cute Finds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <style>

    /* ============================================================
       VARIABLES
    ============================================================ */
    :root {
      --sky:        #c8e6f5;
      --sky-lt:     #e4f3fb;
      --sky-dk:     #a8d4ec;
      --mint:       #c2ede4;
      --mint-lt:    #dff6f1;
      --mint-dk:    #9dddd1;
      --white:      #ffffff;
      --cream:      #f8fbff;
      --cream-dk:   #edf5fb;
      --blush:      #f9d6e0;
      --text:       #3a4a52;
      --text-md:    #6a8292;
      --text-lt:    #9ab5c2;
      --border:     rgba(168,212,236,.35);
      --shadow-sm:  0 2px 16px rgba(138,196,226,.15);
      --shadow-md:  0 8px 40px rgba(138,196,226,.22);
      --shadow-lg:  0 20px 60px rgba(138,196,226,.28);
      --radius-sm:  12px;
      --radius-md:  20px;
      --radius-lg:  32px;
      --radius-full:9999px;
      --tr:         .32s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }
    img { display: block; max-width: 100%; }

    /* ============================================================
       HELPERS
    ============================================================ */
    .container { max-width: 1160px; margin: 0 auto; padding: 0 5%; }
    .eyebrow {
      display: inline-block;
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--sky-dk);
      background: var(--sky-lt);
      padding: .3rem .9rem;
      border-radius: var(--radius-full);
      margin-bottom: 1rem;
    }
    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 4.5vw, 3rem);
      color: var(--text);
      line-height: 1.2;
      margin-bottom: .75rem;
    }
    .section-title em { font-style: italic; color: var(--sky-dk); }
    .section-sub {
      color: var(--text-md);
      font-size: 1.05rem;
      font-weight: 300;
      max-width: 520px;
    }
    .dot-divider {
      display: flex; align-items: center; gap: .6rem;
      margin: 1.5rem 0;
    }
    .dot-divider span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--sky-dk);
      display: block;
    }
    .dot-divider span:nth-child(2) { background: var(--mint-dk); opacity: .7; }
    .dot-divider span:nth-child(3) { background: var(--sky-dk); opacity: .4; }

    /* ============================================================
       NAVIGATION
    ============================================================ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: box-shadow var(--tr);
    }
    nav.scrolled { box-shadow: var(--shadow-sm); }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .nav-brand {
      display: flex; align-items: center; gap: .5rem;
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      color: var(--text);
    }
    .nav-brand-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: linear-gradient(135deg, var(--sky-dk), var(--mint-dk));
    }
    .nav-links {
      display: flex; gap: 2.2rem; list-style: none;
    }
    .nav-links a {
      font-size: .85rem;
      font-weight: 400;
      color: var(--text-md);
      transition: color var(--tr);
      letter-spacing: .02em;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-right { display: flex; gap: .75rem; align-items: center; }
    .nav-pill {
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .04em;
      padding: .5rem 1.3rem;
      border-radius: var(--radius-full);
      transition: all var(--tr);
    }
    .nav-pill-outline {
      border: 1.5px solid var(--sky-dk);
      color: var(--sky-dk);
      background: transparent;
    }
    .nav-pill-outline:hover { background: var(--sky-lt); }
    .nav-pill-filled {
      background: linear-gradient(135deg, var(--sky-dk), var(--mint-dk));
      color: var(--white);
      border: none;
      box-shadow: 0 3px 12px rgba(138,196,226,.4);
    }
    .nav-pill-filled:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(138,196,226,.5); }
    .nav-hamburger { display: none; background: none; border: none; padding: 4px; flex-direction: column; gap: 5px; }
    .nav-hamburger span { display: block; width: 20px; height: 1.5px; background: var(--text-md); border-radius: 2px; }

    /* ============================================================
       HERO
    ============================================================ */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 4rem;
      padding: 8rem 5% 5rem;
      max-width: 1160px;
      margin: 0 auto;
    }

    .hero-left { position: relative; }

    .hero-tag {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--sky-lt);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: .35rem 1rem;
      font-size: .78rem;
      color: var(--sky-dk);
      font-weight: 500;
      margin-bottom: 1.5rem;
      opacity: 0; animation: fadeUp .7s .2s forwards;
    }
    .hero-tag-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mint-dk); }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 6vw, 4.8rem);
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 1.5rem;
      opacity: 0; animation: fadeUp .8s .35s forwards;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--sky-dk);
      display: block;
    }
    .hero h1 .outline-text {
      -webkit-text-stroke: 1.5px var(--sky-dk);
      color: transparent;
    }

    .hero-desc {
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--text-md);
      max-width: 440px;
      margin-bottom: 2.2rem;
      line-height: 1.8;
      opacity: 0; animation: fadeUp .8s .5s forwards;
    }

    .hero-actions {
      display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
      margin-bottom: 3rem;
      opacity: 0; animation: fadeUp .8s .65s forwards;
    }
    .btn-main {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .85rem 2rem;
      background: linear-gradient(135deg, var(--sky-dk), var(--mint-dk));
      color: var(--white);
      border: none;
      border-radius: var(--radius-full);
      font-size: .9rem;
      font-weight: 500;
      letter-spacing: .03em;
      box-shadow: 0 4px 18px rgba(138,196,226,.45);
      transition: all var(--tr);
    }
    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(138,196,226,.55); }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .85rem 1.8rem;
      background: transparent;
      color: var(--text-md);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-full);
      font-size: .9rem;
      font-weight: 400;
      transition: all var(--tr);
    }
    .btn-ghost:hover { border-color: var(--sky-dk); color: var(--text); background: var(--sky-lt); }

    .hero-stats {
      display: flex; gap: 2rem; flex-wrap: wrap;
      opacity: 0; animation: fadeUp .8s .8s forwards;
    }
    .hero-stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--text);
      display: block;
    }
    .hero-stat-lbl {
      font-size: .75rem;
      color: var(--text-lt);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* Hero visual */
    .hero-right {
      position: relative;
      opacity: 0; animation: fadeIn 1s .4s forwards;
    }
    .hero-blob {
      position: absolute;
      border-radius: 60% 40% 55% 45% / 45% 55% 40% 60%;
      z-index: 0;
    }
    .hero-blob-1 {
      width: 420px; height: 420px;
      background: linear-gradient(135deg, var(--sky-lt), var(--mint-lt));
      top: -40px; left: -20px;
      animation: blobFloat 8s ease-in-out infinite;
    }
    .hero-blob-2 {
      width: 260px; height: 260px;
      background: linear-gradient(135deg, var(--blush), var(--sky-lt));
      bottom: 20px; right: -30px;
      opacity: .5;
      animation: blobFloat 10s ease-in-out 2s infinite reverse;
    }
    .hero-card-stack { position: relative; z-index: 1; }
    .hero-main-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      aspect-ratio: 3/4;
      max-width: 320px;
      margin: 0 auto;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem;
      padding: 2rem;
      position: relative;
    }
    .hero-card-visual {
      font-size: 5rem;
      line-height: 1;
      filter: drop-shadow(0 4px 12px rgba(138,196,226,.3));
      animation: floatEmoji 4s ease-in-out infinite;
    }
    .hero-card-label {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--text);
      text-align: center;
    }
    .hero-card-sub {
      font-size: .8rem;
      color: var(--text-lt);
      text-align: center;
    }
    .hero-card-price {
      background: linear-gradient(135deg, var(--sky-dk), var(--mint-dk));
      color: var(--white);
      padding: .4rem 1.2rem;
      border-radius: var(--radius-full);
      font-size: .82rem;
      font-weight: 500;
    }
    /* Floating mini cards */
    .hero-mini-card {
      position: absolute;
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      padding: .75rem 1rem;
      display: flex; align-items: center; gap: .6rem;
      font-size: .82rem;
      color: var(--text);
      white-space: nowrap;
      z-index: 2;
    }
    .hero-mini-card-1 { top: 10px; right: -20px; animation: floatCard1 5s ease-in-out infinite; }
    .hero-mini-card-2 { bottom: 60px; left: -30px; animation: floatCard2 6s ease-in-out 1s infinite; }
    .hero-mini-icon { font-size: 1.2rem; }

    /* ============================================================
       CATEGORIES STRIP
    ============================================================ */
    .categories {
      background: var(--white);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 2rem 5%;
    }
    .categories-inner {
      max-width: 1160px; margin: 0 auto;
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
    }
    .cat-pill {
      display: flex; align-items: center; gap: .5rem;
      padding: .6rem 1.4rem;
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-full);
      font-size: .85rem;
      color: var(--text-md);
      font-weight: 400;
      transition: all var(--tr);
      cursor: pointer;
    }
    .cat-pill:hover, .cat-pill.active {
      background: linear-gradient(135deg, var(--sky-lt), var(--mint-lt));
      border-color: var(--sky-dk);
      color: var(--text);
    }
    .cat-pill-emoji { font-size: 1rem; }

    /* ============================================================
       FEATURED PRODUCTS
    ============================================================ */
    #shop {
      padding: 6rem 5%;
      background: var(--cream);
    }
    .section-header-row {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 3rem; gap: 2rem; flex-wrap: wrap;
    }
    .view-all {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .85rem; color: var(--sky-dk);
      border-bottom: 1px solid var(--sky-dk);
      padding-bottom: .1rem;
      transition: opacity var(--tr);
    }
    .view-all:hover { opacity: .7; }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
    }

    .product-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: all var(--tr);
      display: flex; flex-direction: column;
      position: relative;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-md);
      border-color: var(--sky-dk);
    }

    /* Wishlist heart */
    .product-heart {
      position: absolute; top: .9rem; right: .9rem; z-index: 3;
      width: 32px; height: 32px;
      background: rgba(255,255,255,.92);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem;
      border: 1px solid var(--border);
      transition: all var(--tr);
      opacity: 0;
    }
    .product-card:hover .product-heart { opacity: 1; }
    .product-heart:hover { background: var(--blush); border-color: #f0b8c8; transform: scale(1.1); }

    .product-img {
      width: 100%; aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: .5rem;
      position: relative;
      overflow: hidden;
    }
    .product-img-bg {
      position: absolute; inset: 0;
      transition: transform var(--tr);
    }
    .product-card:hover .product-img-bg { transform: scale(1.04); }

    .bg-sky    { background: linear-gradient(145deg, var(--sky-lt), var(--sky)); }
    .bg-mint   { background: linear-gradient(145deg, var(--mint-lt), var(--mint)); }
    .bg-blush  { background: linear-gradient(145deg, #fde8ef, var(--blush)); }
    .bg-cream  { background: linear-gradient(145deg, #fdf8f0, #faefd8); }

    .product-emoji {
      font-size: 3.2rem;
      position: relative; z-index: 1;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.08));
      transition: transform var(--tr);
    }
    .product-card:hover .product-emoji { transform: scale(1.1) rotate(-3deg); }

    .product-badge {
      position: absolute; top: .75rem; left: .75rem; z-index: 2;
      font-size: .65rem; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      padding: .22rem .65rem;
      border-radius: var(--radius-full);
    }
    .badge-new   { background: var(--mint); color: #3a7a6e; }
    .badge-love  { background: var(--blush); color: #b05070; }
    .badge-pick  { background: var(--sky); color: #3a6a82; }

    .product-body {
      padding: 1.1rem 1.1rem 1rem;
      display: flex; flex-direction: column; flex: 1;
    }
    .product-cat {
      font-size: .68rem; letter-spacing: .14em; text-transform: uppercase;
      color: var(--text-lt); margin-bottom: .3rem;
    }
    .product-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem; color: var(--text);
      margin-bottom: .4rem; line-height: 1.3;
    }
    .product-desc {
      font-size: .83rem; color: var(--text-md);
      font-weight: 300; line-height: 1.6;
      flex: 1; margin-bottom: .9rem;
    }
    .product-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: .5rem;
    }
    .product-price {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem; color: var(--text);
    }
    .product-price small {
      font-family: 'DM Sans', sans-serif;
      font-size: .72rem; color: var(--text-lt);
      display: block; font-weight: 300;
    }
    .btn-shop {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .48rem 1rem;
      background: linear-gradient(135deg, var(--sky-dk), var(--mint-dk));
      color: var(--white);
      border: none;
      border-radius: var(--radius-full);
      font-size: .75rem; font-weight: 500;
      transition: all var(--tr);
      white-space: nowrap;
    }
    .btn-shop:hover { transform: scale(1.04); box-shadow: 0 4px 14px rgba(138,196,226,.45); }

    /* ============================================================
       LIFESTYLE BANNER
    ============================================================ */
    .lifestyle-banner {
      margin: 0 5% 6rem;
      max-width: 1160px;
      margin-left: auto; margin-right: auto;
      background: linear-gradient(135deg, var(--sky-lt) 0%, var(--mint-lt) 50%, #f8eef8 100%);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 4rem 5%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 3rem;
      overflow: hidden;
      position: relative;
    }
    .lifestyle-banner::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.6), transparent 70%);
      top: -100px; right: -100px;
      pointer-events: none;
    }
    .lifestyle-text { position: relative; z-index: 1; }
    .lifestyle-text h2 { margin-bottom: .75rem; }
    .lifestyle-text p { color: var(--text-md); font-weight: 300; margin-bottom: 1.5rem; max-width: 380px; }
    .lifestyle-visual {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
      position: relative; z-index: 1;
    }
    .lifestyle-tile {
      background: rgba(255,255,255,.75);
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,.9);
      aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: .4rem;
      font-size: 2rem;
      transition: transform var(--tr);
      cursor: pointer;
    }
    .lifestyle-tile:hover { transform: scale(1.05); }
    .lifestyle-tile span { font-size: .72rem; color: var(--text-md); font-weight: 400; text-align: center; }
    .lifestyle-tile:nth-child(1) { margin-top: -1rem; }
    .lifestyle-tile:nth-child(4) { margin-bottom: -1rem; }

    /* ============================================================
       ABOUT SECTION
    ============================================================ */
    #about {
      padding: 6rem 5%;
      background: var(--white);
    }
    .about-layout {
      max-width: 1160px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 5rem; align-items: center;
    }
    .about-text .dot-divider { margin: 1rem 0 1.5rem; }
    .about-text p {
      color: var(--text-md); font-weight: 300;
      font-size: 1.05rem; line-height: 1.85;
      margin-bottom: 1.2rem;
    }
    .about-text p:first-of-type {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; font-style: italic;
      color: var(--text); font-weight: 300;
    }
    .about-values {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: .75rem; margin-top: 1.5rem;
    }
    .value-chip {
      display: flex; align-items: flex-start; gap: .6rem;
      padding: .85rem 1rem;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .value-chip-icon { font-size: 1.1rem; line-height: 1.5; }
    .value-chi
